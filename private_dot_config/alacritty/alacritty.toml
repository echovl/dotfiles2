[general]
import = ["~/.config/alacritty/colors.toml"]

[font]
size = 11

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[window.padding]
x = 10
y = 0

[window]
decorations_theme_variant = "Dark"

[keyboard]
bindings = [
  { key = "Key6", mods = "Control", chars = "\u001e" }
]
